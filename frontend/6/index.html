<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yt2mp3 /6 Clay + Ink (Minimal Hybrid)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fbf3e9;
      --paper: #fffaf3;
      --ink: #17120f;
      --muted: rgba(23, 18, 15, 0.65);
      --clay: #efc7a6;
      --leaf: #5a7b55;
      --line: rgba(23, 18, 15, 0.18);
      --focus: #ff3b00;
      --shadow: 10px;
      --r: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 420px at 15% -10%, rgba(239, 199, 166, 0.75), transparent 60%),
        radial-gradient(900px 520px at 95% 110%, rgba(90, 123, 85, 0.28), transparent 60%),
        repeating-linear-gradient(90deg, transparent 0 96px, rgba(23, 18, 15, 0.035) 96px 97px),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 1.2rem;
    }

    .shell {
      width: min(820px, 100%);
      border: 2px solid var(--ink);
      border-radius: calc(var(--r) + 10px);
      background: linear-gradient(155deg, rgba(255, 250, 243, 0.92), rgba(255, 250, 243, 0.78));
      box-shadow: var(--shadow) var(--shadow) 0 var(--ink);
      position: relative;
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: -40px;
      background:
        radial-gradient(260px 210px at 86% 18%, rgba(239, 199, 166, 0.85), transparent 65%),
        radial-gradient(280px 230px at 12% 85%, rgba(90, 123, 85, 0.22), transparent 66%);
      filter: blur(1px);
      pointer-events: none;
      opacity: 0.9;
    }

    header {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      padding: 1.1rem 1.1rem 0.8rem;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 250, 243, 0.65);
      backdrop-filter: blur(6px);
    }

    .brand {
      display: grid;
      gap: 0.1rem;
    }

    .brand h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      letter-spacing: -0.01em;
      font-size: 1.6rem;
      line-height: 1.05;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.2;
    }

    .badge {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--ink);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
      background: rgba(255, 250, 243, 0.9);
      box-shadow: 3px 3px 0 rgba(23, 18, 15, 0.22);
      white-space: nowrap;
    }

    main {
      position: relative;
      z-index: 1;
      padding: 1.1rem;
      display: grid;
      gap: 0.9rem;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(255, 250, 243, 0.78);
      padding: 0.95rem;
    }

    .field {
      display: grid;
      gap: 0.45rem;
      margin-bottom: 0.8rem;
    }

    label {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(23, 18, 15, 0.72);
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(23, 18, 15, 0.35);
      border-radius: 14px;
      padding: 0.8rem 0.85rem;
      font: inherit;
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    input:focus,
    select:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 4px rgba(255, 59, 0, 0.14);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 0.7rem;
    }

    button {
      width: 100%;
      border: 2px solid var(--ink);
      border-radius: 14px;
      padding: 0.78rem 0.9rem;
      background: var(--clay);
      color: var(--ink);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 6px 6px 0 var(--ink);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    button:hover {
      transform: translate(1px, 1px);
      box-shadow: 5px 5px 0 var(--ink);
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(23, 18, 15, 0.35);
      background: rgba(255, 255, 255, 0.55);
      overflow: hidden;
    }

    .bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--leaf), var(--clay), var(--focus));
      transition: width 140ms linear;
    }

    .log {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .log strong {
      color: var(--ink);
      font-weight: 600;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 0.85rem 1.1rem 1.1rem;
      color: rgba(23, 18, 15, 0.5);
      font-size: 0.85rem;
    }

    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
      .badge { display: none; }
      :root { --shadow: 8px; }
    }
  </style>
</head>
<body>
  <section class="shell">
    <header>
      <div class="brand">
        <h1>yt2mp3</h1>
        <p>Paste a link. Pick a format.</p>
      </div>
      <div class="badge">option /6</div>
    </header>

    <main>
      <form class="card" id="job">
        <div class="field">
          <label for="url">URL</label>
          <input id="url" type="url" required placeholder="https://youtu.be/..." />
        </div>

        <div class="row">
          <div class="field" style="margin-bottom: 0;">
            <label for="format">Format</label>
            <select id="format">
              <option value="mp3">MP3</option>
              <option value="flac">FLAC</option>
              <option value="mp4">MP4</option>
            </select>
          </div>
          <div class="field" style="margin-bottom: 0; align-self: end;">
            <button type="submit">Convert</button>
          </div>
        </div>

        <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
        <div class="log" id="log"><span>Status</span><strong>Idle</strong></div>
      </form>
    </main>

    <footer>Minimal UI scaffold. Wire the submit action to your yt2mp3 backend.</footer>
  </section>

  <script>
    const form = document.getElementById('job');
    const bar = document.getElementById('bar');
    const log = document.getElementById('log');

    function setStatus(left, right) {
      log.innerHTML = `<span>${left}</span><strong>${right}</strong>`;
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const url = document.getElementById('url').value.trim();
      const format = document.getElementById('format').value.toUpperCase();

      if (!url) {
        setStatus('Status', 'Missing URL');
        return;
      }

      let p = 0;
      bar.style.width = '0%';
      setStatus('Queued', format);

      const timer = setInterval(() => {
        p += 9 + Math.random() * 17;
        bar.style.width = `${Math.min(p, 100)}%`;
        if (p >= 100) {
          clearInterval(timer);
          setStatus('Done', format);
        }
      }, 160);
    });
  </script>
</body>
</html>
