<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yt2mp3 /1 Brutalist Poster Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #f3ecd6;
      --ink: #101010;
      --signal: #ff3600;
      --block: #ffd100;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        linear-gradient(115deg, rgba(255, 209, 0, 0.18) 0 20%, transparent 20% 100%),
        repeating-linear-gradient(90deg, transparent 0 88px, rgba(16, 16, 16, 0.06) 88px 90px),
        var(--paper);
      color: var(--ink);
      min-height: 100vh;
      font-family: "IBM Plex Mono", monospace;
      padding: 1.4rem;
      display: grid;
      place-items: center;
    }
    .frame {
      width: min(980px, 100%);
      border: 5px solid var(--ink);
      background: var(--paper);
      box-shadow: 14px 14px 0 var(--ink);
      position: relative;
      overflow: hidden;
    }
    .tag {
      position: absolute;
      top: 1rem;
      right: -3rem;
      transform: rotate(28deg);
      background: var(--signal);
      color: #fff;
      padding: 0.35rem 3.6rem;
      font-weight: 600;
      letter-spacing: 0.08em;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      min-height: 640px;
    }
    .left {
      border-right: 5px solid var(--ink);
      padding: 2.2rem;
    }
    .kicker {
      display: inline-block;
      border: 3px solid var(--ink);
      background: var(--block);
      padding: 0.4rem 0.55rem;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
    }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(3rem, 11vw, 7.4rem);
      line-height: 0.86;
      margin: 0;
      letter-spacing: 0.01em;
    }
    .sub {
      max-width: 40ch;
      margin: 1rem 0 1.4rem;
      font-size: 0.95rem;
      line-height: 1.55;
      border-left: 4px solid var(--ink);
      padding-left: 0.8rem;
    }
    .status-wall {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.55rem;
    }
    .status-wall div {
      border: 2px solid var(--ink);
      padding: 0.65rem;
      font-size: 0.8rem;
      background: #fff;
      min-height: 68px;
    }
    .status-wall strong {
      display: block;
      font-size: 1.2rem;
      margin-top: 0.35rem;
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.02em;
    }
    .right {
      padding: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: repeating-linear-gradient(180deg, rgba(16, 16, 16, 0.04) 0 3px, transparent 3px 11px);
    }
    .console {
      width: min(360px, 100%);
      border: 4px solid var(--ink);
      background: #fff;
      padding: 1rem;
      display: grid;
      gap: 0.85rem;
    }
    .console label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .console input,
    .console select,
    .console button {
      width: 100%;
      border: 3px solid var(--ink);
      font: inherit;
      padding: 0.75rem;
      background: #fff;
      color: var(--ink);
    }
    .console button {
      background: var(--block);
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 120ms ease;
    }
    .console button:hover { transform: translate(2px, 2px); }
    .progress {
      border: 3px solid var(--ink);
      height: 18px;
      overflow: hidden;
      background: #fff;
    }
    .bar {
      width: 0;
      height: 100%;
      background: repeating-linear-gradient(90deg, var(--signal) 0 14px, #ff8b6f 14px 22px);
      transition: width 150ms linear;
    }
    .log {
      min-height: 4.3rem;
      border: 3px solid var(--ink);
      padding: 0.65rem;
      background: #fff;
      font-size: 0.8rem;
      line-height: 1.45;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .left { border-right: 0; border-bottom: 5px solid var(--ink); }
    }
  </style>
</head>
<body>
  <div class="frame">
    <span class="tag">NO PLAYLIST DRIFT</span>
    <section class="grid">
      <article class="left">
        <span class="kicker">OPTION /1 BRUTALIST POSTER</span>
        <h1>DROP URL<br />GET AUDIO</h1>
        <p class="sub">Deliberately hard-edged interface with print-poster typography, offset shadows, and utility blocks. Built as a direct command bridge for the yt2mp3 engine.</p>
        <div class="status-wall">
          <div>Engine<br /><strong>yt-dlp</strong></div>
          <div>Target<br /><strong>MP3 / FLAC</strong></div>
          <div>Mode<br /><strong>Single URL</strong></div>
        </div>
      </article>
      <aside class="right">
        <form class="console" id="console">
          <div>
            <label for="url">Media URL</label>
            <input id="url" type="url" required placeholder="https://youtube.com/watch?v=..." />
          </div>
          <div>
            <label for="format">Output</label>
            <select id="format">
              <option value="mp3">MP3 192kbps</option>
              <option value="flac">FLAC Lossless</option>
              <option value="mp4">MP4 Video</option>
            </select>
          </div>
          <button type="submit">Convert</button>
          <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
          <div class="log" id="log">Awaiting input.</div>
        </form>
      </aside>
    </section>
  </div>

  <script>
    const form = document.getElementById('console');
    const bar = document.getElementById('bar');
    const log = document.getElementById('log');

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const url = document.getElementById('url').value.trim();
      const format = document.getElementById('format').value;

      if (!url) {
        log.textContent = 'Missing URL. Paste a source first.';
        return;
      }

      let progress = 0;
      log.textContent = `Queued ${format.toUpperCase()} job...`;
      bar.style.width = '0%';

      const timer = setInterval(() => {
        progress += Math.random() * 19;
        bar.style.width = `${Math.min(progress, 100)}%`;

        if (progress >= 100) {
          clearInterval(timer);
          log.textContent = `Complete: ${format.toUpperCase()} package ready for yt2mp3 output.`;
        }
      }, 180);
    });
  </script>
</body>
</html>
