<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yt2mp3 Frontend Concepts</title>
  <style>
    :root {
      --bg: #0f0f13;
      --card: #171922;
      --text: #f5f7ff;
      --muted: #a0a7bf;
      --line: #2a3042;
      --accent: #00e5ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 15% 20%, #232949 0%, var(--bg) 45%), var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main {
      width: min(860px, 100%);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #151826, #10121a);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }
    h1 { margin-top: 0; font-size: clamp(1.5rem, 4vw, 2.4rem); }
    p { color: var(--muted); }
    ul {
      list-style: none;
      margin: 1.5rem 0 0;
      padding: 0;
      display: grid;
      gap: 0.9rem;
    }
    a {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      transition: transform 200ms ease, border-color 200ms ease;
    }
    a:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    small { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>yt2mp3 Frontend Option Set</h1>
    <p>Open each concept:</p>
    <ul>
      <li><a href="./1/index.html">/1 Brutalist Poster Console <small>(original)</small></a></li>
      <li><a href="./2/index.html">/2 Holographic Orbit Panel <small>(keep)</small></a></li>
      <li><a href="./3/index.html">/3 Organic Clay Studio <small>(original)</small></a></li>
      <li><a href="./6/index.html">/6 Clay + Ink Minimal Hybrid <small>(new)</small></a></li>
    </ul>
  </main>
</body>
</html>
